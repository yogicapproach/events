<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossary of Terms | Uruguay 2026</title>
    <meta name="description" content="Glossary of yoga and Sanskrit terms from Satchidananda's talks — Uruguay, February 2026">
    <meta name="author" content="Satchidananda">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Glossary of Terms | Yogaval 2026">
    <meta property="og:description" content="Definitions of yoga and Sanskrit terms used in Satchidananda's talks, Uruguay, February 2026.">
    <meta property="og:url" content="https://yogic-approach.github.io/yogaval-2026/glossary.html">
    <meta property="og:image" content="https://yogic-approach.github.io/yogaval-2026/events/20260218-tantroktam-devi-suktam-la-paloma/resources/cover-tantroktam-devi-suktam.jpg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Glossary of Terms | Yogaval 2026">
    <meta name="twitter:description" content="Definitions of yoga and Sanskrit terms used in Satchidananda's talks, Uruguay, February 2026.">
    <meta name="twitter:image" content="https://yogic-approach.github.io/yogaval-2026/events/20260218-tantroktam-devi-suktam-la-paloma/resources/cover-tantroktam-devi-suktam.jpg">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://docs.google.com">
    <link rel="preconnect" href="https://gc.zgo.at">
    <link rel="icon" type="image/x-icon" href="/yogaval-2026/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/yogaval-2026/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/yogaval-2026/apple-touch-icon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.4/marked.min.js"></script>
    <link rel="stylesheet" href="events/shared.css">
    <style>
        /* Glossary-specific overrides */
        #content h2 { border-bottom: 1px solid #eee; padding-bottom: 4px; }
        #content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
        #content th, #content td { border: 1px solid #ddd; padding: 6px 12px; text-align: left; }
        #content th { background: #f5f5f5; }
    </style>
</head>
<body>
    <a href="#content" class="skip-nav">Skip to content</a>
    <header>
        <h1 id="header-title">Glossary of Terms</h1>
        <p id="header-sub">Satchidananda &mdash; Uruguay, February 2026</p>
    </header>

    <div id="other-talks">
        <span id="other-talks-label" data-href="./">Select <a href="./">a talk</a>:</span>
        <select id="talk-select" aria-label="Select a talk" onchange="handleTalkSelect(this)"></select>
    </div>

    <div class="lang-toggle">
        <button id="btn-en" onclick="loadGlossary('en')">English<span class="lang-sublabel">Original</span></button>
        <button id="btn-es" onclick="loadGlossary('es')">Espa&ntilde;ol<span class="lang-sublabel">IA Traducido</span></button>
        <button id="btn-ne" onclick="loadGlossary('ne')">नेपाली<span class="lang-sublabel">AI अनुवादित</span></button>
    </div>

    <div id="content">
        <p id="loading">Select a language above to read the glossary.</p>
    </div>

    <footer>
        <a id="footer-nav" href="./">&#8592; Back to Synthesis</a>
        <div id="site-credit" class="site-credit">Made with 🧠❤️🙏 by <a href="https://yogicapproach.com" target="_blank" rel="noopener">YogicApproach</a>.</div>
    </footer>

    <script src="events/shared.js"></script>
    <script>
        async function loadGlossary(lang) {
            _currentProgram = 'Glossary of Terms \u2014 Definitions of yoga and Sanskrit terms';
            updateTopbar(lang);
            var isEs = lang === 'es';
            var isNe = lang === 'ne';
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', isEs);
            document.getElementById('btn-ne').classList.toggle('active', isNe);
            var url = new URL(window.location);
            url.searchParams.set('lang', lang);
            history.replaceState(null, '', url);
            document.getElementById('header-title').textContent = isNe
                ? 'शब्दावली'
                : (isEs ? 'Glosario de Términos' : 'Glossary of Terms');
            document.getElementById('header-sub').innerHTML = isNe
                ? 'सत्चिदानन्द &mdash; Uruguay, फेब्रुअरी २०२६'
                : ('Satchidananda &mdash; Uruguay, ' + (isEs ? 'febrero de 2026' : 'February 2026'));
            var labelEl = document.getElementById('other-talks-label');
            if (labelEl) {
                var href = labelEl.dataset.href || './';
                labelEl.innerHTML = isNe
                    ? 'चर्चा <a href="' + href + '">छान्नुहोस्</a>:'
                    : (isEs
                        ? 'Ver <a href="' + href + '">una charla</a>:'
                        : 'Select <a href="' + href + '">a talk</a>:');
            }
            var footerNav = document.getElementById('footer-nav');
            if (footerNav) {
                footerNav.innerHTML = isNe
                    ? '&#8592; सारांशमा फर्कनुहोस्'
                    : (isEs ? '&#8592; Volver a la s&iacute;ntesis' : '&#8592; Back to Synthesis');
            }
            var siteCredit = document.getElementById('site-credit');
            if (siteCredit) {
                var creditLink = '<a href="https://yogicapproach.com" target="_blank" rel="noopener">YogicApproach</a>';
                siteCredit.innerHTML = isNe
                    ? creditLink + ' बाट 🧠❤️🙏 सँग बनाएको'
                    : (isEs ? 'Hecho con 🧠❤️🙏 por ' + creditLink + '.' : 'Made with 🧠❤️🙏 by ' + creditLink + '.');
            }
            loadTalkSelector(lang);
            var el = document.getElementById('content');
            el.innerHTML = '<p id="loading">Loading...</p>';
            try {
                var res = await fetch('glossary-' + lang + '.md');
                if (!res.ok) throw new Error('File not found');
                var md = await res.text();
                el.innerHTML = marked.parse(md);
                if (window.location.hash) {
                    var target = document.querySelector(window.location.hash);
                    if (target) target.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (e) {
                el.innerHTML = '<p class="error-message">Could not load glossary. Please try again.</p>';
            }
        }
        const lang = new URLSearchParams(window.location.search).get('lang') || 'es';
        loadGlossary(lang);
    </script>
</body>
</html>
