<body>
    <a href="#content" class="skip-nav">Skip to content</a>
    <header>
        <h1 id="page-title">Yogaval 2026 &mdash; Events</h1>
        <p id="page-subtitle">Talks by Satchidananda &mdash; Uruguay, February 2026</p>
    </header>

    <div class="lang-toggle">
        <button id="btn-en" onclick="setLang('en')">English<span class="lang-sublabel">Original</span></button>
        <button id="btn-es" onclick="setLang('es')">Espa&ntilde;ol<span class="lang-sublabel">IA Traducido</span></button>
        <button id="btn-ne" onclick="setLang('ne')">नेपाली<span class="lang-sublabel">AI अनुवादित</span></button>
    </div>

        <p id="loading">Loading events...</p>

        <a id="footer-nav" href="../">&#8592; Back to Synthesis</a>

    </footer>

    <script src="shared.js"></script>
    <script>
        function setLang(lang) {
            updateTopbar(lang);
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            document.getElementById('btn-ne').classList.toggle('active', lang === 'ne');
            const url = new URL(window.location);
            url.searchParams.set('lang', lang);
            history.replaceState(null, '', url);
            const isEs = lang === 'es';
            const isNe = lang === 'ne';
            document.getElementById('page-title').innerHTML = isNe
                ? 'Yogaval 2026 &mdash; कार्यक्रमहरू'
                : (isEs ? 'Yogaval 2026 &mdash; Eventos' : 'Yogaval 2026 &mdash; Events');
            document.getElementById('page-subtitle').innerHTML = isNe
                ? 'सत्चिदानन्दका वार्ताहरू &mdash; Uruguay, फेब्रुअरी २०२६'
                : (isEs
                    ? 'Charlas de Satchidananda &mdash; Uruguay, febrero 2026'
                    : 'Talks by Satchidananda &mdash; Uruguay, February 2026');
            var footerNav = document.getElementById('footer-nav');
            if (footerNav) {
                footerNav.innerHTML = isNe
                    ? '&#8592; सारांशमा फर्कनुहोस्'
                    : (isEs ? '&#8592; Volver a la s&iacute;ntesis' : '&#8592; Back to Synthesis');
            }
            loadEventsList(lang);
        }

        const lang = new URLSearchParams(window.location.search).get('lang') || 'es';
        setLang(lang);
    </script>
