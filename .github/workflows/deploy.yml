name: Deploy to yogicapproach.com

on:
  workflow_dispatch:

# Prevent concurrent deploys — if triggered twice, second run waits for first.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout events repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (Eleventy + Pagefind)
        run: npm run build

      - name: Clone public repo
        run: |
          git clone \
            https://x-access-token:${{ secrets.DEPLOY_PAT }}@github.com/yogicapproach/yogicapproach.github.io.git \
            public-repo

      # Additive sync — copies all _site/ contents into the public repo without
      # deleting any existing files (other repos' content, CNAME, index.html, etc.)
      - name: Copy build output
        run: |
          rsync -av --exclude='.git' _site/ public-repo/

      - name: Commit and push
        run: |
          cd public-repo
          git config user.name "yogicapproach-deploy"
          git config user.email "noreply@yogicapproach.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "deploy(events): $(date -u +%Y-%m-%dT%H:%M:%SZ) [${GITHUB_SHA::7}]"
          git push

      # Tag this repo's commit so we can trace which source built what is live
      - name: Tag source commit as last-deployed
        run: |
          TAG="last-deployed-$(date -u +%Y%m%d)"
          git tag -f "$TAG"
          git push origin -f "refs/tags/$TAG"
