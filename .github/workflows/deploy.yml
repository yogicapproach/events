name: Publish to site-root

on:
  workflow_dispatch:

# Never run two publishes concurrently.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout events
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (Eleventy + Pagefind)
        run: npm run build

      - name: Push _site/ to dist branch
        run: |
          cd _site
          git init
          git config user.name "yogicapproach-deploy"
          git config user.email "noreply@yogicapproach.com"
          git add -A
          git commit -m "dist: events from ${GITHUB_SHA::7}"
          git push --force \
            https://x-access-token:${{ secrets.DEPLOY_PAT }}@github.com/yogicapproach/events.git \
            HEAD:dist

      - name: Trigger site-root assembly
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          repository: yogicapproach/site-root
          event-type: dist-updated
          client-payload: >
            {
              "repo": "${{ github.repository }}",
              "sha": "${{ github.sha }}"
            }
