# GitHub Actions — Build Eleventy and deploy _site/ to GitHub Pages.
#
# NOTE: Once this workflow is active and tested, the `docs/` folder approach
# (Settings > Pages > "Deploy from branch: main / docs/") can be switched to
# "Deploy from GitHub Actions" in the repo settings. The docs/ folder will no
# longer be the web root — _site/ (built here) takes over.
#
# Required repo setting after switching:
#   Settings → Pages → Source: "GitHub Actions"

name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Allow only one concurrent deployment, cancelling in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with Eleventy
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
